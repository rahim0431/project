<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard · Sage Campus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-deep: #2C666E;
            --primary-light: #F0EDEE;
            --accent-sage: #3D7B84;
            --text-dark: #1F2C30;
            --text-muted: #4F5E63;
            --border-light: #D6D2D4;
            --card-bg: #FFFFFF;
            --shadow-sm: 0 8px 20px rgba(44, 102, 110, 0.08);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8F9FA;
            margin: 0;
            color: var(--text-dark);
        }
        .header {
            background: var(--card-bg);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo svg { width: 40px; height: 40px; }
        .logo h1 { font-size: 1.5rem; color: var(--primary-deep); }
        .logout-btn {
            background: transparent;
            border: 2px solid var(--accent-sage);
            color: var(--accent-sage);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .logout-btn:hover {
            background: var(--accent-sage);
            color: white;
        }
        .main-content { padding: 40px; }
        .dashboard-title { font-size: 2rem; font-weight: 700; margin-bottom: 30px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow-sm);
        }
        .stat-card h3 {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-top: 0;
            margin-bottom: 10px;
        }
        .stat-card .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-deep);
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="./Home Page/home.html" class="logo">
            <svg width="70" height="70" viewBox="0 0 70 70" fill="none"><rect width="70" height="70" rx="18" fill="#F0EDEE" fill-opacity="0.15"/><rect x="9" y="9" width="52" height="52" rx="14" fill="white"/><path d="M35 22L22 28.5V37.5C22 44.6 27.8 50.5 35 50.5C42.2 50.5 48 44.6 48 37.5V28.5L35 22Z" fill="#2C666E" stroke="#1A444A" stroke-width="2.2" stroke-linejoin="round"/><circle cx="35" cy="37" r="5" fill="#F0EDEE"/></svg>
            <h1>Sage Campus</h1>
        </a>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </header>

    <main class="main-content">
        <h2 class="dashboard-title">Admin Dashboard</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Students</h3>
                <p class="stat-number" id="total-students">...</p>
            </div>
        </div>
    </main>

   <script>

    document.addEventListener("DOMContentLoaded", function(){

        const token = localStorage.getItem("token");
        const role = localStorage.getItem("role");

        if(!token || role !== "admin"){
            alert("Access denied. Please login as admin.");
            window.location.href = "admin-login.html";
        }

    });

    </script>
</body>
</html>
